services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cslearn
      POSTGRES_PASSWORD: cslearn
      POSTGRES_DB: cslearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cslearn"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
